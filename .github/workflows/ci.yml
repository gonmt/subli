name: CI

on: [push, pull_request]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: app
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      APP_ENV: dev
      APP_SECRET: ci-secret
      DATABASE_URL: postgresql://app:app@localhost:5432/app?serverVersion=18&charset=utf8

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo_pgsql, pcov
          coverage: pcov

      - uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - run: composer install --no-interaction

      - run: bin/console cache:warmup

      - run: vendor/bin/phpstan analyse --configuration etc/phpstan/phpstan.neon --memory-limit=512M

      - run: vendor/bin/php-cs-fixer check --config etc/php-cs-fixer/.php-cs-fixer.dist.php --diff --allow-risky=yes

      - run: vendor/bin/deptrac analyse --config-file etc/deptrac/deptrac.yaml

      - run: bin/phpunit --configuration etc/phpunit/phpunit.xml.dist

      - run: vendor/bin/infection --configuration=etc/infection/infection.json5 --threads=4 --ignore-msi-with-no-mutations
